services:
  mysql-dev:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sang_db
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  sang-app:
    build: .
    ports:
      - "8082:8080"
    environment:
      DB_HOST: mysql-dev
      DB_PORT: 3306
      DB_PASSWORD: rootpass
    depends_on:
      mysql-dev:
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8083:80"
    environment:
      PMA_HOST: mysql-dev
      PMA_PORT: 3306
    depends_on:
      - mysql-dev

volumes:
  mysql-data:
