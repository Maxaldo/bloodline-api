# === Application ===
spring.application.name=SANG

# === MySQL Database Configuration ===
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/sang_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}

# === JDBC Driver ===
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# === Server Port ===
server.port=8080

# === JWT Configuration ===
jwt.secret-key=${JWT_SECRET:VOTRE_CLE_SECRETE_BASE64_ICI}
jwt.expiration=${JWT_EXPIRATION:86400000}
